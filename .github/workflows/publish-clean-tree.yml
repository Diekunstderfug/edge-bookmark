name: Publish clean project tree
on:
  push:
    branches: [main]
    paths:
      - ".bootstrap-publish/**"
      - ".github/workflows/publish-clean-tree.yml"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Publish clean tree
        run: |
          set -euo pipefail
          cat .bootstrap-publish/part-* > /tmp/edge-bookmark.tar.gz.b64
          base64 -d /tmp/edge-bookmark.tar.gz.b64 > /tmp/edge-bookmark.tar.gz
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xzf /tmp/edge-bookmark.tar.gz -C .
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi
          git commit -m "Publish clean project tree"
          git push origin HEAD:main
