<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Bookmark Advisor</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 16px;
        width: 420px;
        color: #17202a;
        background: linear-gradient(180deg, #f7fafc 0%, #eef4f7 100%);
      }

      h1 {
        font-size: 18px;
        margin: 0 0 8px;
      }

      code {
        font-size: 12px;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.4;
      }

      .panel {
        background: #ffffff;
        border: 1px solid #e4edf0;
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 12px;
        box-shadow: 0 6px 18px rgba(18, 34, 49, 0.06);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(64px, 1fr));
        gap: 8px;
        margin-top: 8px;
      }

      .stat {
        background: #f4f8fb;
        border-radius: 10px;
        padding: 10px;
      }

      .stat strong {
        display: block;
        font-size: 18px;
      }

      button {
        width: 100%;
        padding: 10px 12px;
        border: 0;
        border-radius: 10px;
        background: #115e59;
        color: white;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      .tabs {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        margin: 12px 0;
      }

      .tab-button {
        background: #d9e8ea;
        color: #17333a;
      }

      .tab-button.active {
        background: #115e59;
        color: #ffffff;
      }

      .tab-panel[hidden] {
        display: none;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        margin: 10px 0 4px;
      }

      input[type="password"],
      input[type="text"],
      input[type="number"],
      select,
      textarea {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #cbd8df;
        border-radius: 10px;
        color: #17202a;
        font-size: 13px;
        padding: 9px 10px;
        font-family: inherit;
      }

      textarea {
        resize: vertical;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 96px;
        gap: 8px;
      }

      .wide-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .button-row {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
        margin-top: 10px;
      }

      button.secondary {
        background: #2f4f5f;
      }

      button.revise {
        background: #1e3a5f;
      }

      button.danger {
        background: #7f1d1d;
      }

      button[disabled] {
        background: #9fb6b8;
        cursor: not-allowed;
      }

      #cancel-job-btn {
        width: auto;
        font-size: 11px;
        padding: 3px 10px;
        margin-left: auto;
        white-space: nowrap;
      }

      ul {
        padding-left: 18px;
        margin: 8px 0 0;
        max-height: 300px;
        overflow: auto;
      }

      li {
        margin-bottom: 6px;
        line-height: 1.35;
      }

      .category-group {
        margin-bottom: 6px;
        border: 1px solid #e4edf0;
        border-radius: 10px;
        overflow: hidden;
      }

      .category-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        background: #e8f0f2;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        color: #17333a;
        user-select: none;
        border: none;
        width: auto;
        border-radius: 0;
      }

      .category-header:hover {
        background: #d4e6e9;
      }

      .category-header .category-name {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .category-header .category-path {
        font-size: 11px;
        color: #52616d;
        font-weight: 400;
      }

      .category-header .count-badge {
        background: #115e59;
        color: white;
        font-size: 11px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 8px;
        min-width: 20px;
        text-align: center;
      }

      .category-header .chevron {
        font-size: 10px;
        transition: transform 0.15s ease;
        color: #52616d;
      }

      .category-header.expanded .chevron {
        transform: rotate(90deg);
      }

      .category-details {
        display: none;
        padding: 6px 10px;
        background: #f7fafc;
      }

      .category-details.open {
        display: block;
      }

      .action-item {
        position: relative;
        padding: 6px 0;
        border-bottom: 1px solid #edf3f5;
      }

      .action-item:last-child {
        border-bottom: none;
      }

      .action-item .action-title {
        font-weight: 600;
        font-size: 12px;
        color: #17202a;
        margin-bottom: 2px;
        word-break: break-word;
      }

      .action-item .action-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        color: #52616d;
        margin-bottom: 2px;
        flex-wrap: wrap;
      }

      .action-item .action-type-label {
        background: #d4e6e9;
        color: #17333a;
        padding: 1px 6px;
        border-radius: 4px;
        font-weight: 600;
        font-size: 10px;
      }

      .action-item .action-type-label.review {
        background: #fef3c7;
        color: #92400e;
      }

      .action-item .action-reason {
        font-size: 11px;
        color: #52616d;
        font-style: italic;
        word-break: break-word;
      }

      .action-item .action-actions {
        display: flex;
        gap: 6px;
        margin-top: 3px;
      }

      .action-item .action-approve {
        font-size: 10px;
        background: #166534;
        color: #fff;
        border: none;
        border-radius: 3px;
        padding: 1px 6px;
        cursor: pointer;
      }

      .action-item .action-quick-approve {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        width: auto;
        margin: 0 0 0 auto;
        padding: 1px 4px;
        border: 1px solid #b7d8c0;
        border-radius: 4px;
        background: #f0fdf4;
        color: #166534;
        font-size: 10px;
        line-height: 1.2;
        font-weight: 600;
        cursor: pointer;
      }

      .action-item .action-quick-approve input {
        width: 11px;
        height: 11px;
        margin: 0;
        accent-color: #166534;
      }

      .action-item .action-quick-approve:hover {
        background: #dcfce7;
        border-color: #86c89b;
      }

      .action-item .action-quick-approve.agreed {
        background: #e8f5ec;
        border-color: #c5dfcc;
        color: #2d6a3e;
        cursor: default;
      }

      .action-item .action-quick-approve.agreed input {
        cursor: default;
      }

      .action-item .action-revise-input {
        display: none;
        width: 100%;
        box-sizing: border-box;
        font-size: 11px;
        padding: 3px 6px;
        margin-top: 4px;
        border: 1px solid #cbd5e1;
        border-radius: 4px;
        font-family: inherit;
      }

      .action-item .action-revise-input.open {
        display: block;
      }

      .action-item .action-revise-input.has-note {
        border-color: #1e3a5f;
        background: #f0f4ff;
      }

      .action-item .confidence-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        vertical-align: middle;
      }

      .action-item .confidence-dot.high { background: #166534; }
      .action-item .confidence-dot.medium { background: #92400e; }
      .action-item .confidence-dot.low { background: #9f1239; }

      .error {
        color: #9f1239;
      }

      .ok {
        color: #166534;
      }

      .warning {
        color: #92400e;
      }

      .hint {
        color: #52616d;
        font-size: 12px;
      }

      .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top-color: #115e59;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        vertical-align: middle;
        margin-right: 6px;
      }

      .spinner[hidden] {
        display: none;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <h1>Bookmark Advisor</h1>

    <div class="tabs" role="tablist" aria-label="Bookmark Advisor sections">
      <button id="plan-tab-btn" class="tab-button active" type="button" role="tab" aria-selected="true" aria-controls="plan-tab" data-i18n="tab_plan">Plan</button>
      <button id="settings-tab-btn" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="settings-tab" data-i18n="tab_llm">LLM</button>
      <button id="preferences-tab-btn" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="preferences-tab" data-i18n="tab_prefs">偏好</button>
    </div>

    <section id="plan-tab" class="tab-panel" role="tabpanel" aria-labelledby="plan-tab-btn">
      <div class="panel">
        <strong data-i18n="label_ai_planning">Generate organization plan</strong>
        <div class="row">
          <div>
            <label for="focus-path" data-i18n="label_focus_folder">Focus folder</label>
            <select id="focus-path">
              <option value="" data-i18n="opt_all_bookmarks">全部书签</option>
            </select>
          </div>
          <div>
            <label for="max-actions" data-i18n="label_max_actions">Max actions</label>
            <input id="max-actions" type="number" min="1" max="80" value="40">
          </div>
        </div>
        <label for="user-instruction" data-i18n="label_user_instruction">Organization notes</label>
        <textarea id="user-instruction" rows="2" data-i18n-placeholder="placeholder_instruction" placeholder="Describe how you want the AI to organize your bookmarks (optional)"></textarea>
        <button id="generate-ai-btn" type="button" data-i18n="btn_generate">Generate AI Plan</button>
        <div style="height: 8px;"></div>
        <button id="export-snapshot-btn" type="button" data-i18n="btn_export">Export Current Snapshot</button>
      </div>

      <div class="panel">
        <input id="plan-file" type="file" accept=".json,application/json">
      </div>

      <div class="panel">
        <div style="display:flex;align-items:center;gap:8px;"><span id="spinner" class="spinner" hidden></span><span id="status">No plan loaded yet.</span><button id="cancel-job-btn" class="danger" type="button" hidden data-i18n="btn_cancel_job">Force Stop</button></div>
        <div class="stats" id="stats" hidden>
          <div class="stat"><strong id="total-count">0</strong><span data-i18n="stat_total">Total</span></div>
          <div class="stat"><strong id="executable-count">0</strong><span data-i18n="stat_executable">Executable</span></div>
          <div class="stat"><strong id="review-count">0</strong><span data-i18n="stat_review">Review</span></div>
          <div class="stat"><strong id="error-count">0</strong><span data-i18n="stat_errors">Errors</span></div>
          <div class="stat"><strong id="warning-count">0</strong><span data-i18n="stat_warnings">Warnings</span></div>
        </div>
      </div>

      <div class="panel">
        <strong data-i18n="label_action_preview">Action preview</strong>
        <div id="preview-list"></div>
      </div>

      <div class="button-row">
        <button id="revise-ai-btn" class="revise" type="button" disabled data-i18n="btn_revise">Revise Loaded Plan</button>
        <button id="execute-btn" disabled data-i18n="btn_execute">Execute Reviewed Plan</button>
      </div>
      <div style="height: 8px;"></div>
      <button id="undo-btn" class="danger" type="button" disabled data-i18n="btn_undo">Undo Last Execution</button>
      <div style="height: 8px;"></div>
      <button id="continue-btn" type="button" hidden data-i18n="btn_continue">Generate New Plan for Remaining</button>
      <div style="height: 8px;"></div>
      <button id="download-report-btn" disabled data-i18n="btn_download_report">Download Execution Report</button>
    </section>

    <section id="settings-tab" class="tab-panel" role="tabpanel" aria-labelledby="settings-tab-btn" hidden>
      <div class="panel">
        <strong data-i18n="label_llm_config">OpenAI-compatible LLM</strong>
        <label for="api-base-url" data-i18n="label_api_url">API base URL</label>
        <input id="api-base-url" type="text" value="https://api.openai.com/v1" spellcheck="false">
        <p class="hint" id="endpoint-preview">Requests will use the configured provider base URL.</p>

        <div class="wide-row">
          <div>
            <label for="api-style" data-i18n="label_endpoint_mode">Endpoint mode</label>
            <select id="api-style">
              <option value="auto">Auto fallback</option>
              <option value="responses">Responses API</option>
              <option value="chat_completions">Chat Completions</option>
              <option value="completions">Completions</option>
            </select>
          </div>
          <div>
            <label for="model">Model</label>
            <input id="model" type="text" value="gpt-4o-mini" spellcheck="false">
          </div>
        </div>

        <label for="api-key" data-i18n="label_api_key">API key</label>
        <input id="api-key" type="password" autocomplete="off" placeholder="sk-..., sk-or-..., provider key">

        <div class="wide-row">
          <div>
            <label for="request-timeout" data-i18n="label_request_timeout">Request timeout (seconds)</label>
            <input id="request-timeout" type="number" min="10" max="300" value="120">
          </div>
          <div>
            <label for="max-retries" data-i18n="label_max_retries">Max retries</label>
            <input id="max-retries" type="number" min="0" max="3" value="1">
          </div>
        </div>
        <p class="hint" data-i18n="hint_timeout_max">Max 300s — MV3 service worker lifecycle limit</p>

        <div class="button-row">
          <button id="save-credentials-btn" class="secondary" type="button" data-i18n="btn_save">Save Credentials</button>
          <button id="forget-key-btn" class="danger" type="button" data-i18n="btn_forget">Forget Key</button>
        </div>
        <p class="hint" id="key-storage-status">No saved key checked yet.</p>
      </div>
    </section>

    <section id="preferences-tab" class="tab-panel" role="tabpanel" aria-labelledby="preferences-tab-btn" hidden>
      <div class="panel">
        <strong data-i18n="label_preferences">规划偏好</strong>

        <label for="pref-lang" data-i18n="label_language">Language</label>
        <select id="pref-lang">
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>

        <label for="pref-protect-root" data-i18n="label_protect_root">顶层散书签保护</label>
        <select id="pref-protect-root">
          <option value="yes" data-i18n="opt_protect_yes">保护 — 不自动整理根目录下的散书签</option>
          <option value="no" data-i18n="opt_protect_no">允许 — 可将根目录散书签归入子文件夹</option>
        </select>

        <label for="pref-sort-order" data-i18n="label_sort_order">整理后排序</label>
        <select id="pref-sort-order">
          <option value="none" data-i18n="opt_sort_none">不改变顺序（保持原样）</option>
          <option value="alpha-asc" data-i18n="opt_sort_asc">按标题字母升序 (A→Z)</option>
          <option value="alpha-desc" data-i18n="opt_sort_desc">按标题字母降序 (Z→A)</option>
        </select>

        <label for="pref-planning-style" data-i18n="label_planning_style">规划风格</label>
        <select id="pref-planning-style">
          <option value="balanced" data-i18n="opt_style_balanced">均衡 — 合理移动，不确定的保留审查</option>
          <option value="conservative" data-i18n="opt_style_conservative">保守 — 只移动非常确定的，其余保持原位</option>
          <option value="aggressive" data-i18n="opt_style_aggressive">积极 — 尽量全部归类，允许创建新文件夹</option>
        </select>
      </div>
    </section>

    <script src="storage_helpers.js"></script>
    <script src="plan_lint.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
